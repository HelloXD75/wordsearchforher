<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Word Game 💖</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: pink;
  text-align: center;
  overflow-x: hidden;
}

h1 { color: white; }

#grid {
  display: grid;
  grid-template-columns: repeat(10, 34px);
  gap: 4px;
  justify-content: center;
  margin-top: 20px;
  touch-action: none; /* IMPORTANT for mobile drag */
}

.cell {
  width: 34px;
  height: 34px;
  background: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  border-radius: 5px;
  user-select: none;
  font-size: 14px;
}

.selected { background: hotpink; color: white; }
.found { background: red; color: white; }

#words span {
  margin: 4px;
  display: inline-block;
  color: white;
  font-weight: bold;
}

.foundWord {
  text-decoration: line-through;
  opacity: 0.5;
}

/* message page */
#messagePage {
  display: none;
  height: 100vh;
  position: relative;
  overflow: hidden;
}

#typingText {
  margin-top: 40vh;
  font-size: 20px;
  color: white;
  padding: 20px;
}

/* hearts */
.heart {
  position: absolute;
  font-size: 18px;
  animation: fall linear infinite;
}

@keyframes fall {
  0% { transform: translateY(-10px); }
  100% { transform: translateY(100vh); }
}
</style>
</head>

<body>

<div id="gamePage">
  <h1>Find All The Words 💕</h1>
  <div id="grid"></div>
  <div id="words"></div>
</div>

<div id="messagePage">
  <div id="typingText"></div>
</div>

<script>
const words = ["LOVE","YOU","ALONDRA","BABY","WIFE","WISH","KIDS"];
const message = "💖 i love you alondra my baby my wife i wish to have kids with you 💖";
const size = 10;

let grid = [];
let cells = [];
let found = [];
let dragging = false;
let start = null;
let current = [];

const gridDiv = document.getElementById("grid");

// build grid
for (let r = 0; r < size; r++) {
  grid[r] = [];
  for (let c = 0; c < size; c++) grid[r][c] = "";
}

// place words (horizontal)
words.forEach(word => {
  let placed = false;
  while (!placed) {
    let r = Math.floor(Math.random() * size);
    let c = Math.floor(Math.random() * (size - word.length));

    let ok = true;
    for (let i = 0; i < word.length; i++) {
      if (grid[r][c + i]) ok = false;
    }

    if (ok) {
      for (let i = 0; i < word.length; i++) {
        grid[r][c + i] = word[i];
      }
      placed = true;
    }
  }
});

// fill random letters
const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
for (let r = 0; r < size; r++) {
  for (let c = 0; c < size; c++) {
    if (!grid[r][c]) {
      grid[r][c] = letters[Math.floor(Math.random() * letters.length)];
    }
  }
}

// render cells + store reference grid (IMPORTANT for speed)
for (let r = 0; r < size; r++) {
  cells[r] = [];
  for (let c = 0; c < size; c++) {
    const div = document.createElement("div");
    div.className = "cell";
    div.textContent = grid[r][c];
    gridDiv.appendChild(div);
    cells[r][c] = div;
  }
}

// word list
const wordsDiv = document.getElementById("words");
words.forEach(w => {
  const s = document.createElement("span");
  s.textContent = w;
  s.dataset.word = w;
  wordsDiv.appendChild(s);
});

// TOUCH HANDLING (FAST MOBILE VERSION)
gridDiv.addEventListener("touchstart", e => {
  const cell = getCell(e.touches[0]);
  if (!cell) return;

  clearSelection();
  dragging = true;
  start = cell;
  current = [cell];
  cell.classList.add("selected");
});

gridDiv.addEventListener("touchmove", e => {
  if (!dragging) return;

  const cell = getCell(e.touches[0]);
  if (!cell) return;

  if (!current.includes(cell)) {
    current.push(cell);
    cell.classList.add("selected");
  }
});

gridDiv.addEventListener("touchend", () => {
  if (!dragging) return;
  dragging = false;

  const word = current.map(c => c.textContent).join("");

  if (words.includes(word) && !found.includes(word)) {
    found.push(word);

    current.forEach(c => {
      c.classList.remove("selected");
      c.classList.add("found");
    });

    document.querySelectorAll("#words span").forEach(s => {
      if (s.dataset.word === word) {
        s.classList.add("foundWord");
      }
    });

  } else {
    clearSelection();
  }

  current = [];

  if (found.length === words.length) {
    setTimeout(showFinal, 700);
  }
});

// get touched cell
function getCell(touch) {
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  if (!el || !el.classList.contains("cell")) return null;
  return el;
}

function clearSelection() {
  current.forEach(c => c.classList.remove("selected"));
}

// FINAL PAGE FLOW
function showFinal() {
  document.getElementById("gamePage").style.display = "none";
  document.getElementById("messagePage").style.display = "block";

  setTimeout(typeMessage, 1000);
}

// typing animation
function typeMessage() {
  let i = 0;
  const div = document.getElementById("typingText");

  function type() {
    if (i < message.length) {
      div.textContent += message[i++];
      setTimeout(type, 35);
    } else {
      startHearts();
    }
  }
  type();
}

// hearts AFTER win
function startHearts() {
  setInterval(() => {
    const h = document.createElement("div");
    h.className = "heart";
    h.textContent = "💖";
    h.style.left = Math.random() * 100 + "vw";
    h.style.animationDuration = (2 + Math.random() * 3) + "s";
    document.body.appendChild(h);

    setTimeout(() => h.remove(), 5000);
  }, 250);
}
</script>

</body>
</html>
